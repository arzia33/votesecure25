<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>VoteSure | Secure Voting Verification & Protection</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%);
            min-height: 100vh;
        }
        .toast {
            animation: slideUp 0.3s ease forwards;
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
        }
        @keyframes slideUp {
            from { transform: translateX(-50%) translateY(100px); opacity: 0; }
            to { transform: translateX(-50%) translateY(0); opacity: 1; }
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            ring: 2px solid #22c55e;
            border-color: #22c55e;
        }
    </style>
</head>
<body>

<div id="root" class="max-w-md mx-auto px-4 py-6 md:max-w-2xl lg:max-w-4xl"></div>

<script>
    // ==================== BACKEND API URL ====================
    // Change this to your Render backend URL after deployment
    // For local testing: "http://localhost:3000"
    // For production: "https://your-app-name.onrender.com"
    const API_BASE = window.location.origin; // This works when frontend is served by backend
    
    // ==================== APP STATE ====================
    let currentView = "home";
    let isAdminAuthenticated = false;
    let adminStats = {};
    let adminReports = [];

    function navigateTo(view) {
        currentView = view;
        render();
    }

    function showToast(message, type = "success") {
        const existing = document.querySelector('.toast');
        if (existing) existing.remove();
        
        const toast = document.createElement("div");
        toast.className = `toast px-5 py-3 rounded-xl shadow-lg text-white font-medium flex items-center gap-2 ${type === 'success' ? 'bg-green-600' : 'bg-red-600'}`;
        toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i> ${message}`;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 5000);
    }

    // ==================== API CALLS TO BACKEND ====================
    async function requestCode(voterId, phone) {
        const response = await fetch(`${API_BASE}/api/request-code`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ voterId, phone })
        });
        return response.json();
    }

    async function verifyVote(voterId, code) {
        const response = await fetch(`${API_BASE}/api/verify`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ voterId, code })
        });
        return response.json();
    }

    async function checkActivity(voterId) {
        const response = await fetch(`${API_BASE}/api/check-activity`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ voterId })
        });
        return response.json();
    }

    async function submitReport(voterId, phone, issueType, description) {
        const response = await fetch(`${API_BASE}/api/report`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ voterId, phone, issueType, description })
        });
        return response.json();
    }

    async function getAdminStats() {
        const response = await fetch(`${API_BASE}/api/admin/stats`);
        return response.json();
    }

    async function getAdminReports() {
        const response = await fetch(`${API_BASE}/api/admin/reports`);
        return response.json();
    }

    // ==================== RENDER FUNCTIONS ====================
    function render() {
        const root = document.getElementById("root");
        if (!root) return;
        
        if (currentView === "home") root.innerHTML = renderHome();
        else if (currentView === "requestCode") root.innerHTML = renderRequestCode();
        else if (currentView === "verifyVote") root.innerHTML = renderVerifyVote();
        else if (currentView === "activityCheck") root.innerHTML = renderActivityCheck();
        else if (currentView === "reportIssue") root.innerHTML = renderReportIssue();
        else if (currentView === "adminLogin") root.innerHTML = renderAdminLogin();
        else if (currentView === "adminDashboard") root.innerHTML = renderAdminDashboard();
        else if (currentView === "supportCenter") root.innerHTML = renderSupportCenter();
        
        attachEvents();
    }

    function renderHome() {
        return `
            <div class="bg-white rounded-2xl shadow-2xl overflow-hidden">
                <div class="bg-gradient-to-r from-green-700 to-green-600 px-6 py-6">
                    <div class="flex justify-between items-center">
                        <div>
                            <h1 class="text-3xl font-bold text-white">VoteSure</h1>
                            <p class="text-green-100 text-sm mt-1">Secure Voting Verification & Protection System</p>
                        </div>
                        <i class="fas fa-shield-alt text-white text-4xl"></i>
                    </div>
                </div>
                <div class="p-6 space-y-4">
                    <div class="bg-green-50 rounded-xl p-4 text-center border border-green-200">
                        <i class="fas fa-check-circle text-green-600 text-2xl mb-1 block"></i>
                        <p class="text-green-800 font-semibold">Verify your vote & protect your electoral rights</p>
                    </div>
                    <button onclick="window.handleNavigate('verifyVote')" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-4 rounded-xl text-lg shadow flex items-center justify-center gap-3 transition">
                        <i class="fas fa-check-double"></i> Verify Vote
                    </button>
                    <button onclick="window.handleNavigate('requestCode')" class="w-full bg-white border-2 border-green-600 text-green-700 hover:bg-green-50 font-semibold py-3 rounded-xl flex items-center justify-center gap-2 transition">
                        <i class="fas fa-key"></i> Request Code
                    </button>
                    <button onclick="window.handleNavigate('activityCheck')" class="w-full bg-white border-2 border-green-600 text-green-700 hover:bg-green-50 font-semibold py-3 rounded-xl flex items-center justify-center gap-2 transition">
                        <i class="fas fa-chart-line"></i> Check Voter Activity
                    </button>
                    <button onclick="window.handleNavigate('reportIssue')" class="w-full bg-white border-2 border-green-600 text-green-700 hover:bg-green-50 font-semibold py-3 rounded-xl flex items-center justify-center gap-2 transition">
                        <i class="fas fa-flag"></i> Report Issue
                    </button>
                    <button onclick="window.handleNavigate('supportCenter')" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-xl flex items-center justify-center gap-2 transition">
                        <i class="fas fa-headset"></i> Help Center & Support
                    </button>
                    <button onclick="window.handleNavigate('adminLogin')" class="w-full bg-gray-800 hover:bg-gray-900 text-white font-semibold py-2 rounded-lg text-sm flex items-center justify-center gap-2 transition">
                        <i class="fas fa-user-shield"></i> Admin Dashboard
                    </button>
                </div>
            </div>
        `;
    }

    function renderSupportCenter() {
        return `
            <div class="bg-white rounded-2xl shadow-xl overflow-hidden">
                <div class="bg-green-700 px-6 py-4 flex items-center gap-3">
                    <button onclick="window.handleNavigate('home')" class="text-white text-xl hover:bg-green-600 p-1 rounded"><i class="fas fa-arrow-left"></i></button>
                    <h2 class="text-2xl font-bold text-white">Help & Support Center</h2>
                </div>
                <div class="p-6 space-y-6">
                    <div class="bg-blue-50 rounded-xl p-4">
                        <h3 class="font-bold text-lg mb-3 flex items-center gap-2"><i class="fas fa-question-circle text-blue-600"></i> Frequently Asked Questions</h3>
                        <div class="space-y-3">
                            <details class="bg-white rounded-lg p-3"><summary>How do I get my verification code?</summary><p class="text-gray-600 mt-2 text-sm">Click "Request Code" on the home page, enter your Voter ID and phone number. You'll receive a 5-character code via SMS.</p></details>
                            <details class="bg-white rounded-lg p-3"><summary>Why didn't I receive my code?</summary><p class="text-gray-600 mt-2 text-sm">Check your phone number format (e.g., 080XXXXXXXX or +234XXXXXXXXXX). Wait 1-2 minutes and try again.</p></details>
                            <details class="bg-white rounded-lg p-3"><summary>How do I report suspicious voting activity?</summary><p class="text-gray-600 mt-2 text-sm">Go to "Report Issue" and provide your details. Reports are reviewed within 24 hours.</p></details>
                            <details class="bg-white rounded-lg p-3"><summary>Is my vote information private?</summary><p class="text-gray-600 mt-2 text-sm">Yes! We never store who you voted for, only verification status.</p></details>
                            <details class="bg-white rounded-lg p-3"><summary>How long is the verification code valid?</summary><p class="text-gray-600 mt-2 text-sm">Codes expire after 3 minutes for security.</p></details>
                        </div>
                    </div>
                    <div class="bg-green-50 rounded-xl p-4">
                        <h3 class="font-bold text-lg mb-3"><i class="fas fa-envelope text-green-600"></i> Contact Support</h3>
                        <div class="space-y-3">
                            <input type="text" id="supportName" placeholder="Full Name" class="w-full p-3 border rounded-xl">
                            <input type="email" id="supportEmail" placeholder="Email Address" class="w-full p-3 border rounded-xl">
                            <input type="tel" id="supportPhone" placeholder="Phone Number" class="w-full p-3 border rounded-xl">
                            <input type="text" id="supportSubject" placeholder="Subject" class="w-full p-3 border rounded-xl">
                            <textarea id="supportMessage" rows="4" placeholder="Describe your issue..." class="w-full p-3 border rounded-xl"></textarea>
                            <button id="submitSupportBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl">Submit Ticket</button>
                            <div id="supportStatus" class="text-center text-sm"></div>
                        </div>
                    </div>
                    <div class="text-center text-gray-600 text-sm">
                        <p><i class="fas fa-phone mr-2"></i> Emergency Support: +234 800 VOTE-SURE</p>
                        <p><i class="fas fa-envelope mr-2"></i> support@votesure.ng</p>
                    </div>
                </div>
            </div>
        `;
    }

    function renderRequestCode() {
        return `
            <div class="bg-white rounded-2xl shadow-xl overflow-hidden">
                <div class="bg-green-700 px-6 py-4 flex items-center gap-3">
                    <button onclick="window.handleNavigate('home')" class="text-white text-xl hover:bg-green-600 p-1 rounded"><i class="fas fa-arrow-left"></i></button>
                    <h2 class="text-2xl font-bold text-white">Request Verification Code</h2>
                </div>
                <div class="p-6 space-y-4">
                    <div><label class="font-semibold">Voter ID (VIN)</label><input type="text" id="voterIdReq" class="w-full mt-1 p-3 border rounded-xl" placeholder="Enter your Voter ID"></div>
                    <div><label class="font-semibold">Phone Number</label><input type="tel" id="phoneReq" class="w-full mt-1 p-3 border rounded-xl" placeholder="080XXXXXXXX or +234XXXXXXXXXX"><p class="text-xs text-gray-500 mt-1">Enter Nigerian phone number</p></div>
                    <button id="sendCodeBtn" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-xl text-lg">Send Code</button>
                    <div id="codeStatus" class="text-center text-sm"></div>
                </div>
            </div>
        `;
    }

    function renderVerifyVote() {
        return `
            <div class="bg-white rounded-2xl shadow-xl overflow-hidden">
                <div class="bg-green-700 px-6 py-4 flex items-center gap-3">
                    <button onclick="window.handleNavigate('home')" class="text-white text-xl hover:bg-green-600 p-1 rounded"><i class="fas fa-arrow-left"></i></button>
                    <h2 class="text-2xl font-bold text-white">Verify Your Vote</h2>
                </div>
                <div class="p-6 space-y-4">
                    <div><label class="font-semibold">Voter ID</label><input type="text" id="voterIdVerify" class="w-full mt-1 p-3 border rounded-xl" placeholder="Voter ID"></div>
                    <div><label class="font-semibold">Verification Code</label><input type="text" id="codeVerify" class="w-full mt-1 p-3 border rounded-xl" placeholder="5-character code" maxlength="5"></div>
                    <button id="doVerifyBtn" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-xl text-lg">Verify</button>
                    <div id="verifyResult" class="text-center font-semibold"></div>
                </div>
            </div>
        `;
    }

    function renderActivityCheck() {
        return `
            <div class="bg-white rounded-2xl shadow-xl overflow-hidden">
                <div class="bg-green-700 px-6 py-4 flex items-center gap-3">
                    <button onclick="window.handleNavigate('home')" class="text-white text-xl hover:bg-green-600 p-1 rounded"><i class="fas fa-arrow-left"></i></button>
                    <h2 class="text-2xl font-bold text-white">Voter Activity Check</h2>
                </div>
                <div class="p-6 space-y-4">
                    <div><label class="font-semibold">Voter ID (VIN)</label><input type="text" id="activityVoterId" class="w-full mt-1 p-3 border rounded-xl" placeholder="Enter Voter ID"></div>
                    <button id="checkActivityBtn" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-xl text-lg">Check Activity</button>
                    <div id="activityResult" class="text-center p-4 rounded-xl"></div>
                </div>
            </div>
        `;
    }

    function renderReportIssue() {
        return `
            <div class="bg-white rounded-2xl shadow-xl overflow-hidden">
                <div class="bg-green-700 px-6 py-4 flex items-center gap-3">
                    <button onclick="window.handleNavigate('home')" class="text-white text-xl hover:bg-green-600 p-1 rounded"><i class="fas fa-arrow-left"></i></button>
                    <h2 class="text-2xl font-bold text-white">Report Suspicious Activity</h2>
                </div>
                <div class="p-6 space-y-4">
                    <div><label class="font-semibold">Voter ID</label><input type="text" id="reportVoterId" class="w-full mt-1 p-3 border rounded-xl" placeholder="Voter ID"></div>
                    <div><label class="font-semibold">Phone Number</label><input type="tel" id="reportPhone" class="w-full mt-1 p-3 border rounded-xl" placeholder="Phone for follow-up"></div>
                    <div><label class="font-semibold">Issue Type</label><select id="reportType" class="w-full mt-1 p-3 border rounded-xl"><option>Unauthorized voting</option><option>Verification issue</option><option>Other</option></select></div>
                    <div><label class="font-semibold">Description</label><textarea id="reportDesc" rows="3" class="w-full mt-1 p-3 border rounded-xl" placeholder="Provide details..."></textarea></div>
                    <button id="submitReportBtn" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-xl text-lg">Submit Report</button>
                    <div id="reportStatus" class="text-center text-sm"></div>
                </div>
            </div>
        `;
    }

    function renderAdminLogin() {
        return `
            <div class="bg-white rounded-2xl shadow-xl overflow-hidden">
                <div class="bg-green-700 px-6 py-4 flex items-center gap-3">
                    <button onclick="window.handleNavigate('home')" class="text-white text-xl hover:bg-green-600 p-1 rounded"><i class="fas fa-arrow-left"></i></button>
                    <h2 class="text-2xl font-bold text-white">Admin Login</h2>
                </div>
                <div class="p-6 space-y-4">
                    <div class="text-center mb-4"><i class="fas fa-lock text-green-600 text-5xl"></i></div>
                    <div><label class="font-semibold">Password</label><input type="password" id="adminPassword" class="w-full mt-1 p-3 border rounded-xl"></div>
                    <button id="adminLoginBtn" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-xl">Login</button>
                    <div id="loginError" class="text-center text-red-600 text-sm"></div>
                </div>
            </div>
        `;
    }

    async function renderAdminDashboard() {
        try {
            const stats = await getAdminStats();
            const reports = await getAdminReports();
            return `
                <div class="bg-white rounded-2xl shadow-xl overflow-hidden">
                    <div class="bg-green-700 px-6 py-4 flex items-center justify-between">
                        <div class="flex items-center gap-3"><button onclick="window.handleNavigate('home')" class="text-white text-xl"><i class="fas fa-arrow-left"></i></button><h2 class="text-2xl font-bold text-white">Admin Dashboard</h2></div>
                        <button onclick="window.logoutAdmin()" class="bg-red-600 hover:bg-red-700 text-white px-3 py-1 rounded-lg text-sm">Logout</button>
                    </div>
                    <div class="p-6 space-y-6">
                        <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
                            <div class="bg-green-100 p-3 rounded-xl text-center"><i class="fas fa-check-circle text-green-600 text-2xl"></i><p class="text-2xl font-bold">${stats.totalVerifications || 0}</p><p class="text-xs">Verifications</p></div>
                            <div class="bg-yellow-100 p-3 rounded-xl text-center"><i class="fas fa-flag text-yellow-600 text-2xl"></i><p class="text-2xl font-bold">${stats.totalReports || 0}</p><p class="text-xs">Reports</p></div>
                            <div class="bg-red-100 p-3 rounded-xl text-center"><i class="fas fa-exclamation-triangle text-red-600 text-2xl"></i><p class="text-2xl font-bold">${stats.flaggedVoters || 0}</p><p class="text-xs">Flagged</p></div>
                            <div class="bg-orange-100 p-3 rounded-xl text-center"><i class="fas fa-clock text-orange-600 text-2xl"></i><p class="text-2xl font-bold">${stats.pendingReports || 0}</p><p class="text-xs">Pending</p></div>
                        </div>
                        <div><h3 class="font-bold text-lg mb-3">Recent Reports</h3><div class="space-y-2 max-h-96 overflow-y-auto">${reports.length === 0 ? '<p class="text-gray-500 text-center py-4">No reports yet</p>' : reports.slice(0,10).map(r => `<div class="border-l-4 border-green-500 bg-gray-50 p-3 rounded"><p class="font-bold text-sm">Voter: ${r.voterId}</p><p class="text-xs">Issue: ${r.issueType}</p><p class="text-xs text-gray-400">${new Date(r.createdAt).toLocaleString()}</p></div>`).join('')}</div></div>
                    </div>
                </div>
            `;
        } catch (error) {
            return `<div class="bg-white rounded-2xl p-6 text-center"><p class="text-red-600">Error loading admin data. Make sure backend is running.</p><button onclick="window.handleNavigate('home')" class="mt-4 bg-green-600 text-white px-4 py-2 rounded">Go Back</button></div>`;
        }
    }

    // ==================== EVENT HANDLERS ====================
    window.handleNavigate = (view) => navigateTo(view);
    window.logoutAdmin = () => navigateTo("home");

    async function handleSendCode() {
        const voterId = document.getElementById("voterIdReq")?.value.trim();
        const phone = document.getElementById("phoneReq")?.value.trim();
        const statusDiv = document.getElementById("codeStatus");
        const sendBtn = document.getElementById("sendCodeBtn");
        
        if (!voterId || !phone) { showToast("Please enter both Voter ID and Phone Number", "error"); return; }
        
        sendBtn.disabled = true;
        sendBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Sending...';
        
        const result = await requestCode(voterId, phone);
        
        if (result.success) {
            showToast(`Code sent to ${phone}`, "success");
            if (statusDiv) statusDiv.innerHTML = `<span class="text-green-600"><i class="fas fa-check-circle"></i> ${result.message}</span>`;
        } else {
            showToast(result.error || "Failed to send code", "error");
            if (statusDiv) statusDiv.innerHTML = `<span class="text-red-600"><i class="fas fa-exclamation-circle"></i> ${result.error || "Failed to send"}</span>`;
        }
        
        sendBtn.disabled = false;
        sendBtn.innerHTML = 'Send Code';
    }

    async function handleVerify() {
        const voterId = document.getElementById("voterIdVerify")?.value.trim();
        const code = document.getElementById("codeVerify")?.value.trim().toUpperCase();
        const resultDiv = document.getElementById("verifyResult");
        
        if (!voterId || !code) { showToast("Enter both fields", "error"); return; }
        
        const result = await verifyVote(voterId, code);
        
        if (result.success) {
            resultDiv.innerHTML = `<div class="bg-green-100 text-green-800 p-3 rounded-xl"><i class="fas fa-check-circle"></i> ✅ ${result.message}</div>`;
            showToast(result.message, "success");
        } else {
            resultDiv.innerHTML = `<div class="bg-red-100 text-red-800 p-3 rounded-xl"><i class="fas fa-times-circle"></i> ❌ ${result.message}</div>`;
            showToast(result.message, "error");
        }
    }

    async function handleActivityCheck() {
        const voterId = document.getElementById("activityVoterId")?.value.trim();
        const resultDiv = document.getElementById("activityResult");
        
        if (!voterId) { showToast("Enter Voter ID", "error"); return; }
        
        const result = await checkActivity(voterId);
        
        if (result.hasActivity) {
            resultDiv.innerHTML = `<div class="bg-yellow-100 text-yellow-800 p-3 rounded-xl"><i class="fas fa-exclamation-triangle"></i> ⚠️ ${result.message}</div>`;
        } else {
            resultDiv.innerHTML = `<div class="bg-green-100 text-green-800 p-3 rounded-xl"><i class="fas fa-check-circle"></i> ✅ ${result.message}</div>`;
        }
    }

    async function handleSubmitReport() {
        const voterId = document.getElementById("reportVoterId")?.value.trim();
        const phone = document.getElementById("reportPhone")?.value.trim();
        const issueType = document.getElementById("reportType")?.value;
        const description = document.getElementById("reportDesc")?.value.trim();
        const statusDiv = document.getElementById("reportStatus");
        
        if (!voterId || !phone) { showToast("Voter ID and Phone required", "error"); return; }
        
        const result = await submitReport(voterId, phone, issueType, description);
        
        if (result.success) {
            statusDiv.innerHTML = `<span class="text-green-600"><i class="fas fa-check-circle"></i> ${result.message}</span>`;
            showToast(result.message, "success");
            setTimeout(() => navigateTo("home"), 2000);
        } else {
            showToast(result.error || "Failed to submit report", "error");
        }
    }

    async function handleSubmitSupport() {
        showToast("Support ticket feature coming soon. Please email support@votesure.ng", "info");
    }

    async function handleAdminLogin() {
        const password = document.getElementById("adminPassword")?.value;
        if (password === "M@!k2345") {
            const dashboardHtml = await renderAdminDashboard();
            document.getElementById("root").innerHTML = dashboardHtml;
            attachEvents();
            showToast("Admin login successful", "success");
        } else {
            showToast("Invalid password", "error");
        }
    }

    function attachEvents() {
        document.getElementById("sendCodeBtn")?.addEventListener("click", handleSendCode);
        document.getElementById("doVerifyBtn")?.addEventListener("click", handleVerify);
        document.getElementById("checkActivityBtn")?.addEventListener("click", handleActivityCheck);
        document.getElementById("submitReportBtn")?.addEventListener("click", handleSubmitReport);
        document.getElementById("submitSupportBtn")?.addEventListener("click", handleSubmitSupport);
        document.getElementById("adminLoginBtn")?.addEventListener("click", handleAdminLogin);
    }

    render();
</script>

</body>
</html>
